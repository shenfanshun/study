<style>
:root {
  --purple: #534AB7; --purple-bg: #EEEDFE; --purple-txt: #3C3489;
  --teal:   #0F6E56; --teal-bg:   #E1F5EE; --teal-txt:   #085041;
  --coral:  #993C1D; --coral-bg:  #FAECE7; --coral-txt:  #4A1B0C;
  --blue:   #185FA5; --blue-bg:   #E6F1FB; --blue-txt:   #042C53;
  --pink:   #993556; --pink-bg:   #FBEAF0; --pink-txt:   #4B1528;
  --green:  #3B6D11; --green-bg:  #EAF3DE; --green-txt:  #173404;
  --amber:  #854F0B; --amber-bg:  #FAEEDA; --amber-txt:  #412402;
  --red:    #A32D2D; --red-bg:    #FCEBEB; --red-txt:    #501313;
  --indigo: #3C3489; --indigo-bg: #EEEDFE; --indigo-txt: #26215C;
  --teal2:  #085041; --teal2-bg:  #E1F5EE; --teal2-txt:  #04342C;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #f5f5f3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* ── NAV ── */
.nav { display: flex; align-items: center; gap: 10px; padding: 14px 16px 10px; background: #fff; border-bottom: 1px solid #e8e6e0; position: sticky; top: 0; z-index: 10; }
.nav-back { background: none; border: 1px solid #d0cec8; border-radius: 8px; padding: 7px 13px; font-size: 15px; color: #555; cursor: pointer; }
.nav-title { font-size: 16px; font-weight: 600; color: #1a1a1a; flex: 1; }
.nav-sub { font-size: 12px; color: #888; }

/* ── HOME ── */
.home-hero { padding: 24px 16px 16px; text-align: center; }
.home-hero h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; }
.home-hero p { font-size: 14px; color: #888; margin-top: 4px; }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 24px; }
.cat-card {
  background: #fff; border-radius: 14px; padding: 16px 14px;
  border: 1px solid #e8e6e0; cursor: pointer;
  border-left-width: 4px; transition: opacity .15s;
  -webkit-user-select: none; user-select: none;
}
.cat-card:active { opacity: .7; }
.cat-icon { font-size: 26px; margin-bottom: 8px; }
.cat-name { font-size: 13px; font-weight: 600; color: #1a1a1a; line-height: 1.3; }
.cat-count { font-size: 11px; color: #999; margin-top: 3px; }

/* ── LIST ── */
.search-wrap { padding: 10px 16px; background: #fff; border-bottom: 1px solid #e8e6e0; }
.search-wrap input {
  width: 100%; padding: 10px 14px; border: 1px solid #d0cec8;
  border-radius: 10px; font-size: 16px; background: #f9f8f6; color: #1a1a1a;
  outline: none;
}
.search-wrap input:focus { border-color: #888; }
.term-list { padding: 10px 16px 24px; display: flex; flex-direction: column; gap: 8px; }
.term-row {
  background: #fff; border-radius: 12px; padding: 14px 16px;
  border: 1px solid #e8e6e0; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  transition: opacity .15s;
}
.term-row:active { opacity: .6; }
.term-en { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.term-zh { font-size: 13px; color: #888; margin-top: 2px; }
.term-arr { color: #bbb; font-size: 18px; }

/* ── CARD ── */
.card-wrap { padding: 12px 16px 30px; }
.card-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.nav-btn {
  background: #fff; border: 1px solid #d0cec8; border-radius: 10px;
  padding: 10px 18px; font-size: 15px; color: #444; cursor: pointer;
  transition: opacity .15s; min-width: 90px;
}
.nav-btn:active { opacity: .6; }
.nav-btn:disabled { opacity: .3; cursor: default; }
.card-ctr { font-size: 13px; color: #999; }
.progress-bar { height: 4px; background: #e8e6e0; border-radius: 99px; margin-bottom: 14px; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .3s; }
.flashcard {
  background: #fff; border-radius: 18px; border: 1px solid #e8e6e0;
  padding: 24px 20px; min-height: 380px; display: flex; flex-direction: column; gap: 14px;
}
.fc-badge {
  display: inline-block; font-size: 12px; font-weight: 600;
  padding: 4px 12px; border-radius: 99px; align-self: flex-start;
}
.fc-en { font-size: 24px; font-weight: 700; color: #1a1a1a; line-height: 1.25; }
.fc-zh { font-size: 17px; color: #555; font-weight: 500; }
.fc-divider { border: none; border-top: 1px solid #ede; }
.fc-desc { font-size: 16px; color: #333; line-height: 1.65; flex: 1; }
.fc-footer { font-size: 12px; color: #bbb; text-align: right; }

.hidden { display: none; }
</style>
</head>

<!-- HOME -->
<div id="screen-home">
  <div style="padding:14px 16px 10px;background:#fff;border-bottom:1px solid #e8e6e0;position:sticky;top:0;z-index:10;">
    <div style="font-size:18px;font-weight:700;color:#1a1a1a;">iPAS AI 圖卡</div>
    <div style="font-size:12px;color:#888;">2026 初級必備 300 詞 · 10 大主題</div>

  <div class="cat-grid" id="cat-grid"></div>
</div>

<!-- LIST -->
<div id="screen-list" class="hidden">
  <div class="nav">
    <button class="nav-back" onclick="showHome()">← 首頁</button>
    <div>
      <div class="nav-title" id="list-title"></div>
      <div class="nav-sub" id="list-sub"></div>
    </div>
  </div>
  <div class="search-wrap">
    <input type="search" placeholder="搜尋英文、中文或說明..." id="search-input" oninput="filterTerms()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="term-list" id="term-list"></div>
</div>

<!-- CARD -->
<div id="screen-card" class="hidden">
  <div class="nav">
    <button class="nav-back" onclick="showList()">← 列表</button>
    <div class="nav-title" id="card-cat-name"></div>
  </div>
  <div class="card-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="card-nav">
      <button class="nav-btn" id="btn-prev" onclick="prevCard()">‹ 上一張</button>
      <span class="card-ctr" id="card-ctr"></span>
      <button class="nav-btn" id="btn-next" onclick="nextCard()">下一張 ›</button>
    </div>
    <div class="flashcard" id="flashcard"></div>
  </div>
</div>

<script>
const CATS=[
  {id:0,name:"機器學習基礎",en:"Machine Learning",icon:"🤖",color:"#534AB7",bg:"#EEEDFE",txt:"#3C3489"},
  {id:1,name:"深度學習與神經網路",en:"Deep Learning",icon:"🧠",color:"#0F6E56",bg:"#E1F5EE",txt:"#085041"},
  {id:2,name:"自然語言處理",en:"NLP",icon:"💬",color:"#993C1D",bg:"#FAECE7",txt:"#4A1B0C"},
  {id:3,name:"電腦視覺",en:"Computer Vision",icon:"👁️",color:"#185FA5",bg:"#E6F1FB",txt:"#042C53"},
  {id:4,name:"大型語言模型與生成式 AI",en:"LLM & GenAI",icon:"✨",color:"#993556",bg:"#FBEAF0",txt:"#4B1528"},
  {id:5,name:"AI 模型訓練與評估",en:"Training & Evaluation",icon:"📊",color:"#3B6D11",bg:"#EAF3DE",txt:"#173404"},
  {id:6,name:"資料處理與工程",en:"Data Engineering",icon:"🗄️",color:"#854F0B",bg:"#FAEEDA",txt:"#412402"},
  {id:7,name:"AI 倫理與治理",en:"Ethics & Governance",icon:"⚖️",color:"#A32D2D",bg:"#FCEBEB",txt:"#501313"},
  {id:8,name:"AI 應用與系統架構",en:"Applications & Architecture",icon:"🏗️",color:"#3C3489",bg:"#EEEDFE",txt:"#26215C"},
  {id:9,name:"AI 工具與平台",en:"Tools & Platforms",icon:"🛠️",color:"#085041",bg:"#E1F5EE",txt:"#04342C"},
];

const TERMS=[
{c:0,en:"Artificial Intelligence",zh:"人工智慧",d:"讓電腦模擬人類智慧行為的科學與工程領域，包含學習、推理、感知與解決問題等能力。"},
{c:0,en:"Machine Learning",zh:"機器學習",d:"透過資料讓演算法自動找出規律並改善預測效能，無需明確程式化每一條規則。"},
{c:0,en:"Supervised Learning",zh:"監督式學習",d:"使用帶有標籤（答案）的訓練資料，讓模型學習輸入與輸出間的對應關係。"},
{c:0,en:"Unsupervised Learning",zh:"非監督式學習",d:"資料無標籤，模型自行發掘隱藏的結構或群集，如分群（Clustering）。"},
{c:0,en:"Reinforcement Learning",zh:"強化學習",d:"智能體透過與環境互動，依據獎勵或懲罰信號持續調整策略以最大化長期報酬。"},
{c:0,en:"Semi-supervised Learning",zh:"半監督式學習",d:"結合少量標籤資料與大量無標籤資料進行訓練，降低標注成本。"},
{c:0,en:"Self-supervised Learning",zh:"自監督式學習",d:"從資料本身自動產生監督信號（如遮蔽語言模型），不需人工標注。"},
{c:0,en:"Classification",zh:"分類",d:"預測輸入屬於哪個離散類別，例如垃圾郵件判斷、圖像辨識。"},
{c:0,en:"Regression",zh:"迴歸",d:"預測連續數值輸出，例如房價預測或銷售量預測。"},
{c:0,en:"Clustering",zh:"分群",d:"將資料依相似性自動分組，常見演算法有 K-means 與 DBSCAN。"},
{c:0,en:"Dimensionality Reduction",zh:"降維",d:"在保留關鍵資訊的前提下，減少特徵數量，如 PCA、t-SNE。"},
{c:0,en:"Feature Engineering",zh:"特徵工程",d:"從原始資料中選取、建立或轉換特徵，以提升模型表現。"},
{c:0,en:"Overfitting",zh:"過擬合",d:"模型過度記憶訓練資料細節，導致在新資料上表現下降。"},
{c:0,en:"Underfitting",zh:"欠擬合",d:"模型複雜度不足，無法捕捉資料規律，訓練與測試表現皆差。"},
{c:0,en:"Bias-Variance Tradeoff",zh:"偏差-變異數權衡",d:"模型的偏差（系統性誤差）與變異數（對資料波動的敏感度）之間的平衡關係。"},
{c:0,en:"Cross-Validation",zh:"交叉驗證",d:"將資料分成多折，輪流作為驗證集，以更穩健地估計模型泛化效能。"},
{c:0,en:"Hyperparameter",zh:"超參數",d:"訓練前人工設定的參數（如學習率、樹的深度），有別於模型從資料學到的參數。"},
{c:0,en:"Decision Tree",zh:"決策樹",d:"以樹狀結構依特徵值逐層分裂，最終到達葉節點得出預測結果。"},
{c:0,en:"Random Forest",zh:"隨機森林",d:"整合多棵決策樹的集成方法，透過投票或平均提升準確率與穩定性。"},
{c:0,en:"Gradient Boosting",zh:"梯度提升",d:"以序列方式訓練弱學習器，每棵樹修正前一棵的殘差，代表算法有 XGBoost、LightGBM。"},
{c:0,en:"Support Vector Machine",zh:"支援向量機",d:"尋找使類別間邊距最大的超平面進行分類，可透過核函數處理非線性問題。"},
{c:0,en:"k-Nearest Neighbors",zh:"k 最近鄰",d:"依距離找出最相近的 k 個訓練樣本，以多數決定類別或平均決定數值。"},
{c:0,en:"Naive Bayes",zh:"樸素貝葉斯",d:"基於貝氏定理並假設特徵間條件獨立，常用於文字分類與垃圾郵件過濾。"},
{c:0,en:"Ensemble Learning",zh:"集成學習",d:"結合多個學習器的預測以提升整體效能，方法包括 Bagging、Boosting 和 Stacking。"},
{c:0,en:"Transfer Learning",zh:"遷移學習",d:"將預訓練模型所學到的知識遷移到新任務，大幅減少所需訓練資料與時間。"},
{c:0,en:"Data Augmentation",zh:"資料增強",d:"對訓練資料進行隨機翻轉、裁切、旋轉等變換，增加多樣性以防止過擬合。"},
{c:0,en:"Regularization",zh:"正則化",d:"對模型複雜度施加懲罰（如 L1、L2），抑制過擬合並提升泛化能力。"},
{c:0,en:"Loss Function",zh:"損失函數",d:"衡量模型預測值與真實值之間差距的函數，訓練目標是最小化損失。"},
{c:0,en:"Gradient Descent",zh:"梯度下降",d:"沿損失函數梯度的反方向更新參數，是神經網路訓練最基礎的優化方法。"},
{c:0,en:"Learning Rate",zh:"學習率",d:"控制每次參數更新步幅大小的超參數，過大易振盪，過小收斂慢。"},
{c:1,en:"Neural Network",zh:"神經網路",d:"模仿生物神經元結構的計算模型，由輸入層、隱藏層與輸出層組成。"},
{c:1,en:"Deep Learning",zh:"深度學習",d:"使用多層（深層）神經網路自動學習資料的層次化特徵表示。"},
{c:1,en:"Activation Function",zh:"激活函數",d:"為神經元引入非線性，常見有 ReLU、Sigmoid、Tanh 等。"},
{c:1,en:"Backpropagation",zh:"反向傳播",d:"利用鏈鎖法則從輸出層往回計算各層參數梯度，是訓練神經網路的核心演算法。"},
{c:1,en:"Convolutional Neural Network",zh:"卷積神經網路 (CNN)",d:"利用卷積層自動提取空間特徵，廣泛應用於影像辨識與物件偵測。"},
{c:1,en:"Recurrent Neural Network",zh:"遞歸神經網路 (RNN)",d:"具有循環連接，可處理序列資料，但易發生梯度消失問題。"},
{c:1,en:"Long Short-Term Memory",zh:"長短期記憶 (LSTM)",d:"RNN 的改良版，透過閘機制（輸入、遺忘、輸出閘）有效學習長距離依賴。"},
{c:1,en:"Transformer",zh:"轉換器架構",d:"基於自注意力機制的架構，可並行處理序列，是現代大型語言模型的基礎。"},
{c:1,en:"Attention Mechanism",zh:"注意力機制",d:"讓模型在處理每個位置時動態關注輸入序列中最相關的部分。"},
{c:1,en:"Self-Attention",zh:"自注意力",d:"序列中每個元素對序列內所有其他元素計算注意力分數，捕捉全域依賴。"},
{c:1,en:"Batch Normalization",zh:"批次正規化",d:"對每個 mini-batch 的激活值進行正規化，加速訓練並穩定收斂。"},
{c:1,en:"Dropout",zh:"隨機丟棄",d:"訓練時隨機停用一定比例的神經元，是防止過擬合的有效正則化技術。"},
{c:1,en:"Weight Initialization",zh:"權重初始化",d:"設定神經網路初始參數的策略（如 Xavier、He），影響訓練穩定性與收斂速度。"},
{c:1,en:"Residual Network",zh:"殘差網路 (ResNet)",d:"引入跳躍連接（skip connection）讓梯度直接流過，解決深層網路訓練退化問題。"},
{c:1,en:"Encoder-Decoder",zh:"編碼器-解碼器",d:"將輸入壓縮為潛在表示（編碼），再從中還原目標輸出（解碼），廣用於翻譯、生成。"},
{c:1,en:"Embedding",zh:"嵌入",d:"將離散的高維資料（如詞彙、類別）映射到低維稠密向量空間的表示法。"},
{c:1,en:"Pooling Layer",zh:"池化層",d:"對特徵圖進行降採樣（最大池化、平均池化），減少計算量並提高位置不變性。"},
{c:1,en:"Generative Adversarial Network",zh:"生成對抗網路 (GAN)",d:"生成器與判別器對抗訓練，生成器負責生成假資料，判別器學習辨別真偽。"},
{c:1,en:"Variational Autoencoder",zh:"變分自編碼器 (VAE)",d:"學習資料的潛在機率分布，可從連續潛在空間採樣生成新資料。"},
{c:1,en:"Diffusion Model",zh:"擴散模型",d:"透過逐步加噪再逐步去噪的過程學習資料分布，是 Stable Diffusion 等圖像生成的基礎。"},
{c:1,en:"Graph Neural Network",zh:"圖神經網路 (GNN)",d:"在圖結構資料（節點與邊）上進行訊息傳遞與聚合的神經網路。"},
{c:1,en:"Multi-Head Attention",zh:"多頭注意力",d:"並行執行多組注意力計算，讓模型同時關注不同子空間的資訊。"},
{c:1,en:"Positional Encoding",zh:"位置編碼",d:"向 Transformer 輸入加入位置資訊，使模型感知序列中元素的相對或絕對位置。"},
{c:1,en:"Optimizer",zh:"優化器",d:"更新神經網路參數的演算法，常見有 SGD、Adam、AdamW 等。"},
{c:1,en:"Epoch",zh:"訓練週期（輪次）",d:"整個訓練資料集完整地被模型學習一次，稱為一個 Epoch。"},
{c:1,en:"Mini-batch",zh:"小批次",d:"每次參數更新所用的資料子集，是全批次與單樣本更新之間的折衷。"},
{c:1,en:"Vanishing Gradient",zh:"梯度消失",d:"深層網路反向傳播時梯度逐層縮小趨近於零，導致淺層參數難以更新。"},
{c:1,en:"Exploding Gradient",zh:"梯度爆炸",d:"深層網路中梯度逐層放大導致數值溢位，常以梯度裁剪（Gradient Clipping）處理。"},
{c:1,en:"ReLU",zh:"線性整流函數",d:"Rectified Linear Unit，f(x)=max(0,x)，計算高效且緩解梯度消失，是最常用激活函數。"},
{c:1,en:"Softmax",zh:"軟最大值函數",d:"將輸出轉換為機率分布（總和為1），常用於多分類問題的輸出層。"},
{c:2,en:"Natural Language Processing",zh:"自然語言處理 (NLP)",d:"讓電腦理解、分析與生成人類語言文字或語音的技術領域。"},
{c:2,en:"Tokenization",zh:"斷詞/切詞",d:"將文本切分為詞彙、子詞或字元單位（token）的前處理步驟。"},
{c:2,en:"Word2Vec",zh:"詞向量模型",d:"透過預測周圍詞彙（CBOW、Skip-gram）將詞映射為稠密向量，捕捉語意相似性。"},
{c:2,en:"BERT",zh:"雙向編碼器表示模型",d:"Bidirectional Encoder Representations from Transformers，以遮蔽語言模型預訓練，理解雙向上下文。"},
{c:2,en:"GPT",zh:"生成式預訓練轉換器",d:"Generative Pre-trained Transformer，自回歸語言模型，從左到右預測下一個詞。"},
{c:2,en:"Named Entity Recognition",zh:"命名實體辨識 (NER)",d:"識別文本中的專有名詞，如人名、地名、組織名、日期等。"},
{c:2,en:"Sentiment Analysis",zh:"情感分析",d:"判斷文本表達的情緒傾向，如正向、負向或中性。"},
{c:2,en:"Text Classification",zh:"文字分類",d:"將文本自動分配到預定類別，應用包括新聞分類、主題標記。"},
{c:2,en:"Machine Translation",zh:"機器翻譯",d:"自動將一種語言的文字轉換為另一種語言，代表系統有 Google Translate、DeepL。"},
{c:2,en:"Text Summarization",zh:"文字摘要",d:"自動提取或生成文本重點，分為抽取式（抽取句子）與摘要式（重新生成）。"},
{c:2,en:"Question Answering",zh:"問答系統",d:"給定問題與文本，自動找出或生成答案，如閱讀理解、開放域問答。"},
{c:2,en:"Information Retrieval",zh:"資訊檢索",d:"從大量文件中找出與查詢最相關的文件或段落。"},
{c:2,en:"TF-IDF",zh:"詞頻-逆文件頻率",d:"衡量詞對文件重要性的統計量，詞頻高但跨文件稀少者得分高。"},
{c:2,en:"Bag of Words",zh:"詞袋模型",d:"以詞彙出現次數的向量表示文本，忽略順序與語法結構。"},
{c:2,en:"N-gram",zh:"N 元語法",d:"連續 N 個詞彙的組合，用於語言模型與文字特徵提取。"},
{c:2,en:"Stop Words",zh:"停用詞",d:"在文字處理中常被過濾掉的高頻無意義詞彙，如「的」、「是」、「and」。"},
{c:2,en:"Stemming",zh:"詞幹提取",d:"將詞彙還原為詞根形式（如 running → run），但可能產生非真實詞。"},
{c:2,en:"Lemmatization",zh:"詞形還原",d:"將詞彙還原為字典標準形式（詞元），比詞幹提取更精確。"},
{c:2,en:"Coreference Resolution",zh:"共指消解",d:"判斷文本中不同詞彙（如代詞）是否指稱同一實體。"},
{c:2,en:"Dependency Parsing",zh:"依存句法分析",d:"分析句子中詞彙之間的語法依存關係，建構樹狀結構。"},
{c:2,en:"Constituency Parsing",zh:"成分句法分析",d:"將句子分解為嵌套的語法成分（如名詞短語、動詞短語）。"},
{c:2,en:"Speech Recognition",zh:"語音辨識 (ASR)",d:"將語音訊號轉換為文字，又稱 Automatic Speech Recognition。"},
{c:2,en:"Text-to-Speech",zh:"文字轉語音 (TTS)",d:"將文字轉換為自然語音輸出的技術。"},
{c:2,en:"Dialogue System",zh:"對話系統",d:"能與人類進行自然語言對話的 AI 系統，分任務導向與開放域兩大類。"},
{c:2,en:"Semantic Similarity",zh:"語意相似度",d:"衡量兩段文本在語意層面接近程度，常以嵌入向量的餘弦相似度計算。"},
{c:2,en:"Relation Extraction",zh:"關係抽取",d:"從文本中自動識別實體間的語意關係，如「蘋果」「創辦」「賈伯斯」。"},
{c:2,en:"Cloze Test",zh:"完形填空",d:"遮蔽句子中的部分詞彙，要求模型預測被遮蔽的詞，常用於語言模型評估。"},
{c:2,en:"Perplexity",zh:"困惑度",d:"衡量語言模型對測試資料預測能力的指標，值越低表示模型越準確。"},
{c:2,en:"BPE",zh:"位元組對編碼",d:"Byte Pair Encoding，透過合併高頻字元對建構子詞詞彙表，平衡詞彙量與覆蓋率。"},
{c:2,en:"BLEU Score",zh:"BLEU 評分",d:"Bilingual Evaluation Understudy，衡量機器翻譯輸出與人工參考譯文相似度的自動指標。"},
{c:3,en:"Computer Vision",zh:"電腦視覺",d:"使電腦能「看懂」並理解圖像與影片內容的 AI 技術領域。"},
{c:3,en:"Image Classification",zh:"影像分類",d:"判斷圖像屬於哪個預定類別，如辨識貓狗、辨識病灶。"},
{c:3,en:"Object Detection",zh:"物件偵測",d:"在圖像中定位並分類多個物件，輸出邊界框（bounding box）與類別標籤。"},
{c:3,en:"Semantic Segmentation",zh:"語意分割",d:"對圖像每個像素進行類別標記，如自駕車將路面、行人、車輛分開著色。"},
{c:3,en:"Instance Segmentation",zh:"實例分割",d:"在語意分割基礎上進一步區分同類別的不同個體（實例）。"},
{c:3,en:"YOLO",zh:"即時物件偵測模型",d:"You Only Look Once，單次前向傳播即可完成物件定位與分類，速度快適合即時應用。"},
{c:3,en:"Anchor Box",zh:"錨框",d:"物件偵測中預設的參考邊界框，模型預測相對於錨框的偏移量。"},
{c:3,en:"Non-Maximum Suppression",zh:"非極大值抑制 (NMS)",d:"過濾重疊偵測框，保留置信度最高的邊界框，消除重複偵測。"},
{c:3,en:"Intersection over Union",zh:"交並比 (IoU)",d:"衡量預測邊界框與真實框重疊程度的指標，常用作物件偵測的評估標準。"},
{c:3,en:"Data Preprocessing",zh:"資料前處理",d:"對圖像進行正規化、縮放、色彩轉換等操作，使其適合模型輸入。"},
{c:3,en:"Feature Map",zh:"特徵圖",d:"卷積層輸出的二維張量，表示卷積核在輸入圖像上各位置的響應。"},
{c:3,en:"Image Segmentation",zh:"影像分割",d:"將圖像分為具有特定語意意義的區域，是電腦視覺的核心任務之一。"},
{c:3,en:"Optical Flow",zh:"光流",d:"描述視訊幀間像素運動的向量場，用於動作辨識與影片分析。"},
{c:3,en:"Pose Estimation",zh:"姿態估計",d:"估計人體或物體的空間姿勢，輸出關鍵點位置（如關節座標）。"},
{c:3,en:"Facial Recognition",zh:"人臉辨識",d:"識別圖像中人臉身份的技術，廣泛應用於安全驗證與考勤系統。"},
{c:3,en:"GAN Image Generation",zh:"GAN 圖像生成",d:"利用 GAN 架構生成逼真的圖像、影片或樣式轉換，如 StyleGAN。"},
{c:3,en:"Image Inpainting",zh:"圖像修復",d:"自動填補圖像中遺失或損壞的區域，使其視覺上完整連貫。"},
{c:3,en:"Super Resolution",zh:"超解析度",d:"從低解析度圖像重建高解析度版本，應用於醫學影像與衛星圖像增強。"},
{c:3,en:"Style Transfer",zh:"風格遷移",d:"將一張圖的藝術風格應用到另一張圖的內容上，如把照片轉成梵谷畫風。"},
{c:3,en:"Depth Estimation",zh:"深度估計",d:"從單張或多張圖像推斷場景中各物體的距離資訊。"},
{c:3,en:"Image Augmentation",zh:"圖像增強",d:"對訓練圖像進行翻轉、旋轉、色調調整等操作，擴充資料集多樣性。"},
{c:3,en:"Batch Size",zh:"批次大小",d:"每次參數更新所使用的圖像數量，影響訓練速度與記憶體需求。"},
{c:3,en:"Pre-trained Model",zh:"預訓練模型",d:"在大規模資料集（如 ImageNet）上預先訓練好的模型，可直接使用或微調。"},
{c:3,en:"Fine-tuning",zh:"微調",d:"在預訓練模型基礎上，以少量特定領域資料繼續訓練，快速適應新任務。"},
{c:3,en:"Bounding Box",zh:"邊界框",d:"物件偵測中以矩形框住目標物件的標注或預測結果，以座標（x,y,w,h）表示。"},
{c:4,en:"Large Language Model",zh:"大型語言模型 (LLM)",d:"以海量文字資料訓練的超大規模語言模型，如 GPT-4、Claude、Gemini，具備強大的文字生成與理解能力。"},
{c:4,en:"Generative AI",zh:"生成式 AI",d:"能夠產生新內容（文字、圖像、音樂、影片）的 AI 系統，代表技術包括 LLM 與 Diffusion Model。"},
{c:4,en:"Prompt",zh:"提示詞",d:"輸入給 AI 模型的指令或問題，是使用者與生成式 AI 溝通的主要介面。"},
{c:4,en:"Prompt Engineering",zh:"提示詞工程",d:"設計與優化提示詞的技術，目的是引導模型產生更準確、有用的輸出。"},
{c:4,en:"Context Window",zh:"上下文視窗",d:"模型一次能處理的最大 Token 數量，決定對話記憶長度與可輸入文件大小。"},
{c:4,en:"Token",zh:"語言單元（詞元）",d:"語言模型的基本處理單位，可為詞彙、子詞或字元，計費與限制常以 Token 數計算。"},
{c:4,en:"Temperature",zh:"溫度參數",d:"控制生成文字隨機性的參數；高溫輸出更多樣創意，低溫輸出更確定保守。"},
{c:4,en:"Top-p Sampling",zh:"核採樣",d:"只從累積機率達 p 的最高機率詞彙中採樣，平衡多樣性與連貫性。"},
{c:4,en:"Top-k Sampling",zh:"Top-k 採樣",d:"每步只從機率最高的 k 個詞彙中採樣，限制生成範圍。"},
{c:4,en:"Hallucination",zh:"幻覺（模型臆造）",d:"模型生成看似合理但實際錯誤或虛假的資訊，是 LLM 的主要可靠性挑戰。"},
{c:4,en:"In-context Learning",zh:"情境學習",d:"模型在提示詞中看到少量範例即能執行新任務，無需更新參數。"},
{c:4,en:"Few-shot Learning",zh:"少樣本學習",d:"提示詞中提供少量（3–10 個）範例，引導模型理解任務格式與期望輸出。"},
{c:4,en:"Zero-shot Learning",zh:"零樣本學習",d:"不提供任何範例，模型依靠自身知識直接執行未見過的任務。"},
{c:4,en:"Chain-of-Thought",zh:"思維鏈推理",d:"在提示詞中加入逐步推理過程，引導模型展示中間步驟，提升複雜推理準確率。"},
{c:4,en:"Retrieval-Augmented Generation",zh:"檢索增強生成 (RAG)",d:"結合資訊檢索與生成模型，先從知識庫撈取相關文件再生成回答，降低幻覺。"},
{c:4,en:"Fine-tuning LLM",zh:"大型語言模型微調",d:"以特定領域或任務資料對預訓練 LLM 繼續訓練，使其更符合特定需求。"},
{c:4,en:"RLHF",zh:"人類回饋強化學習",d:"Reinforcement Learning from Human Feedback，利用人類偏好評分訓練獎勵模型再微調 LLM，使輸出更符合人類期望。"},
{c:4,en:"PEFT",zh:"參數高效微調",d:"Parameter-Efficient Fine-Tuning，只微調少量參數（如 LoRA、Adapter），大幅降低計算成本。"},
{c:4,en:"LoRA",zh:"低秩適應",d:"Low-Rank Adaptation，以低秩矩陣分解方式插入可訓練參數，僅需更新極少量參數即可微調 LLM。"},
{c:4,en:"Instruction Tuning",zh:"指令微調",d:"以（指令, 回應）對形式的資料微調 LLM，使其能遵循自然語言指令完成任務。"},
{c:4,en:"System Prompt",zh:"系統提示詞",d:"對話開始前設定 AI 行為、角色與限制的提示詞，使用者通常不可見。"},
{c:4,en:"Multimodal AI",zh:"多模態 AI",d:"能同時理解並生成文字、圖像、音訊等多種模態資料的 AI 系統。"},
{c:4,en:"Foundation Model",zh:"基礎模型",d:"以大規模資料訓練的通用大型模型，可作為多種下游任務的起點。"},
{c:4,en:"AI Agent",zh:"AI 智能代理",d:"具備感知環境、規劃行動、使用工具並自主執行多步驟任務能力的 AI 系統。"},
{c:4,en:"Tool Use / Function Calling",zh:"工具呼叫/函數呼叫",d:"LLM 能夠呼叫外部 API 或程式函數以取得即時資訊或執行動作的能力。"},
{c:4,en:"Embeddings",zh:"嵌入向量",d:"將文字、圖像等轉換為稠密數值向量，用於語意搜尋、推薦系統等應用。"},
{c:4,en:"Vector Database",zh:"向量資料庫",d:"專門儲存和高效檢索高維向量的資料庫，如 Pinecone、Weaviate，是 RAG 的核心基礎架構。"},
{c:4,en:"Semantic Search",zh:"語意搜尋",d:"以語意理解而非關鍵字匹配來檢索最相關內容，基於嵌入向量的相似度計算。"},
{c:4,en:"Guardrails",zh:"護欄",d:"對 AI 輸出施加的限制或過濾機制，防止有害、偏頗或不當內容的生成。"},
{c:4,en:"Alignment",zh:"AI 對齊",d:"確保 AI 系統的行為與人類價值觀、意圖及社會規範一致的研究方向。"},
{c:4,en:"Constitutional AI",zh:"憲法式 AI",d:"Anthropic 提出的方法，讓 AI 依據一組明確的原則進行自我評估與改進。"},
{c:4,en:"Model Card",zh:"模型卡",d:"說明模型用途、能力、限制、訓練資料與評估結果的標準文件。"},
{c:4,en:"Benchmark",zh:"基準測試",d:"用於評估 AI 模型能力的標準化測試集，如 MMLU、HumanEval、GLUE。"},
{c:4,en:"Emergent Ability",zh:"湧現能力",d:"模型規模超過某閾值後突然出現的意外能力，如少樣本推理、算術計算等。"},
{c:4,en:"Scaling Law",zh:"縮放定律",d:"描述模型效能隨參數量、資料量及算力增加而提升的規律性關係。"},
{c:4,en:"Mixture of Experts",zh:"專家混合模型 (MoE)",d:"每次前向傳播只激活部分專家網路，在不大幅增加推理成本下擴大模型容量。"},
{c:5,en:"Training Data",zh:"訓練資料",d:"用於訓練機器學習模型的已標注或未標注資料集，品質與規模直接影響模型效能。"},
{c:5,en:"Validation Set",zh:"驗證集",d:"訓練過程中用於調整超參數及監控模型表現的保留資料集，不參與梯度更新。"},
{c:5,en:"Test Set",zh:"測試集",d:"模型訓練完成後用於評估最終泛化效能的獨立資料集，只用一次。"},
{c:5,en:"Precision",zh:"精確率",d:"所有預測為正例中真正為正例的比例，衡量模型預測的準確性。"},
{c:5,en:"Recall",zh:"召回率",d:"所有真正正例中被正確識別出的比例，衡量模型的覆蓋程度。"},
{c:5,en:"F1 Score",zh:"F1 分數",d:"精確率與召回率的調和平均數，綜合衡量分類效能，適合類別不平衡場景。"},
{c:5,en:"Accuracy",zh:"準確率",d:"正確預測數佔總預測數的比例，是最直觀的分類指標，但不適用於不平衡資料。"},
{c:5,en:"Confusion Matrix",zh:"混淆矩陣",d:"以矩陣形式呈現分類模型各類別的真陽性、假陽性、真陰性、假陰性結果。"},
{c:5,en:"ROC Curve",zh:"ROC 曲線",d:"以假陽性率為 x 軸、真陽性率為 y 軸的效能曲線，曲線下面積（AUC）越大越好。"},
{c:5,en:"AUC",zh:"曲線下面積",d:"Area Under the Curve，衡量分類模型辨別能力的指標，範圍 0-1，0.5 為隨機，1 為完美。"},
{c:5,en:"Mean Squared Error",zh:"均方誤差 (MSE)",d:"預測值與真實值差的平方之平均，迴歸任務常用的損失函數與評估指標。"},
{c:5,en:"Mean Absolute Error",zh:"平均絕對誤差 (MAE)",d:"預測值與真實值差的絕對值之平均，比 MSE 對離群值更具穩健性。"},
{c:5,en:"Ablation Study",zh:"消融實驗",d:"移除或停用模型某一元件，評估其對整體效能的貢獻，常用於論文中驗證設計決策。"},
{c:5,en:"Baseline",zh:"基準模型",d:"作為比較標準的簡單模型，新方法需超越基準才具有實際意義。"},
{c:5,en:"Model Compression",zh:"模型壓縮",d:"在儘量保持效能的前提下縮小模型，方法包括剪枝、量化、知識蒸餾。"},
{c:5,en:"Knowledge Distillation",zh:"知識蒸餾",d:"以大型教師模型的輸出（軟標籤）訓練小型學生模型，使學生模型習得教師知識。"},
{c:5,en:"Quantization",zh:"量化",d:"將模型參數從浮點數降低精度（如 FP32→INT8），減少記憶體佔用與推理延遲。"},
{c:5,en:"Pruning",zh:"剪枝",d:"移除對效能貢獻小的神經元或連接，減少模型大小與計算量。"},
{c:5,en:"Early Stopping",zh:"早停法",d:"在驗證集表現不再提升時停止訓練，防止過擬合並節省計算資源。"},
{c:5,en:"Learning Rate Scheduler",zh:"學習率調度器",d:"在訓練過程中動態調整學習率的策略，如餘弦退火、線性衰減。"},
{c:5,en:"Weight Decay",zh:"權重衰減",d:"L2 正則化的一種形式，在每次更新時將參數向零收縮，抑制過擬合。"},
{c:5,en:"Momentum",zh:"動量",d:"優化器中累積過去梯度方向以加速收斂並跳脫局部極小值的技術。"},
{c:5,en:"Mixed Precision Training",zh:"混合精度訓練",d:"同時使用 FP16 與 FP32 進行訓練，加速計算並降低顯存需求。"},
{c:5,en:"Distributed Training",zh:"分散式訓練",d:"將訓練任務分散到多個 GPU 或機器上並行執行，加速超大型模型訓練。"},
{c:5,en:"Data Parallelism",zh:"資料並行",d:"在多個裝置上各自保存完整模型，每次用不同資料子集計算梯度後聚合更新。"},
{c:5,en:"Model Parallelism",zh:"模型並行",d:"將模型不同層或部分分配到不同裝置，用於超大模型無法放入單一 GPU 記憶體的情況。"},
{c:5,en:"Checkpoint",zh:"檢查點",d:"訓練過程中定期儲存的模型參數快照，用於中斷後恢復訓練或選取最佳模型。"},
{c:5,en:"Hyperparameter Tuning",zh:"超參數調整",d:"系統地搜尋最佳超參數組合，方法有網格搜尋、隨機搜尋、貝葉斯優化。"},
{c:5,en:"AutoML",zh:"自動化機器學習",d:"自動化選擇模型、特徵工程與超參數調整的流程，降低機器學習門檻。"},
{c:5,en:"Neural Architecture Search",zh:"神經架構搜尋 (NAS)",d:"自動搜尋最佳神經網路架構的技術，替代人工設計的試錯過程。"},
{c:6,en:"Data Pipeline",zh:"資料管線",d:"從資料收集、清洗、轉換到模型輸入的自動化工作流程。"},

let curCat=0, curIdx=0, filtered=[];

function show(id){
  ['screen-home','screen-list','screen-card'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden', s!==id);
  });
  window.scrollTo(0,0);
}

function showHome(){ show('screen-home'); }

function showList(catId){
  if(catId!==undefined) curCat=catId;
  const cat=CATS[curCat];
  document.getElementById('list-title').textContent=cat.name;
  document.getElementById('search-input').value='';
  filtered=TERMS.filter(t=>t.c===curCat);
  document.getElementById('list-sub').textContent=`${cat.en} · ${filtered.length} 個詞彙`;
  renderList();
  show('screen-list');
}

function filterTerms(){
  const q=document.getElementById('search-input').value.toLowerCase();
  filtered=TERMS.filter(t=>t.c===curCat&&(t.en.toLowerCase().includes(q)||t.zh.includes(q)||t.d.includes(q)));
  renderList();
}

function renderList(){
  document.getElementById('term-list').innerHTML=filtered.map((t,i)=>`
    <div class="term-row" onclick="showCard(${i})">
      <div><div class="term-en">${t.en}</div><div class="term-zh">${t.zh}</div></div>
      <div class="term-arr">›</div>
    </div>`).join('');
}

function showCard(idx){
  curIdx=idx;
  document.getElementById('card-cat-name').textContent=CATS[curCat].name;
  renderCard();
  show('screen-card');
}

function renderCard(){
  const t=filtered[curIdx], cat=CATS[t.c], total=filtered.length;
  document.getElementById('card-ctr').textContent=`${curIdx+1} / ${total}`;
  document.getElementById('btn-prev').disabled=curIdx===0;
  document.getElementById('btn-next').disabled=curIdx===total-1;
  const pct=Math.round((curIdx+1)/total*100);
  document.getElementById('progress-fill').style.cssText=`width:${pct}%;background:${cat.color}`;
  document.getElementById('flashcard').innerHTML=`
    <span class="fc-badge" style="background:${cat.bg};color:${cat.txt}">${cat.name}</span>
    <div class="fc-en">${t.en}</div>
    <div class="fc-zh">${t.zh}</div>
    <hr class="fc-divider">
    <div class="fc-desc">${t.d}</div>
    <div class="fc-footer">${curIdx+1} / ${total}</div>`;
}

function prevCard(){ if(curIdx>0){curIdx--;renderCard();window.scrollTo(0,0);} }
function nextCard(){ if(curIdx<filtered.length-1){curIdx++;renderCard();window.scrollTo(0,0);} }

// Build home grid
const grid=document.getElementById('cat-grid');
CATS.forEach((cat,i)=>{
  const cnt=TERMS.filter(t=>t.c===i).length;
  const d=document.createElement('div');
  d.className='cat-card';
  d.style.borderLeftColor=cat.color;
  d.onclick=()=>showList(i);
  d.innerHTML=`<div class="cat-icon">${cat.icon}</div><div class="cat-name">${cat.name}</div><div class="cat-count">${cnt} 個詞彙</div>`;
  grid.appendChild(d);
});
</script>
</body>
</html>
