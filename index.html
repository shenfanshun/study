<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>iPAS AI 初級 — 閃卡複習</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --blue:   #185FA5; --blue-lt: #E6F1FB; --blue-dk: #0C447C;
    --teal:   #0F6E56; --teal-lt: #E1F5EE; --teal-dk: #085041;
    --amber:  #BA7517; --amber-lt:#FAEEDA; --amber-dk:#633806;
    --coral:  #993C1D; --coral-lt:#FAECE7; --coral-dk:#4A1B0C;
    --purple: #534AB7; --purple-lt:#EEEDFE;--purple-dk:#3C3489;
    --gray:   #444441; --gray-lt: #F1EFE8; --gray-dk: #2C2C2A;
    --radius: 18px;
    --shadow: 0 8px 32px rgba(0,0,0,.13);
  }

  body {
    font-family: -apple-system, 'PingFang TC', 'Noto Sans TC', sans-serif;
    background: #f0ede8;
    min-height: 100vh;
    display: flex; flex-direction: column;
    overflow: hidden;
    height: 100dvh;
  }

  /* ── top bar ── */
  .topbar {
    background: #fff;
    padding: 14px 18px 10px;
    border-bottom: 1px solid #e5e2dc;
    flex-shrink: 0;
  }
  .topbar-title { font-size: 13px; font-weight: 600; color: #444; letter-spacing: .02em; }
  .topbar-sub   { font-size: 11px; color: #999; margin-top: 2px; }

  /* ── tabs ── */
  .tabs {
    display: flex; overflow-x: auto; gap: 6px;
    padding: 10px 14px;
    background: #fff;
    border-bottom: 1px solid #e5e2dc;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 6px 13px;
    border-radius: 100px;
    font-size: 12px; font-weight: 500;
    border: 1.5px solid transparent;
    cursor: pointer;
    background: #f5f3ef;
    color: #777;
    transition: all .15s;
  }
  .tab.active { color: #fff; border-color: transparent; }

  /* ── progress ── */
  .progress-bar {
    height: 3px; background: #e5e2dc; flex-shrink: 0;
  }
  .progress-fill { height: 100%; transition: width .3s ease; }

  /* ── card area ── */
  .card-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px 16px 10px;
    overflow: hidden; position: relative;
  }

  .card-counter {
    font-size: 12px; color: #aaa; margin-bottom: 14px; font-weight: 500;
  }

  /* ── flip card ── */
  .flip-wrap {
    width: 100%; max-width: 400px;
    perspective: 1000px;
    cursor: pointer;
  }
  .flip-inner {
    position: relative;
    width: 100%;
    min-height: 280px;
    transform-style: preserve-3d;
    transition: transform .45s cubic-bezier(.4,0,.2,1);
  }
  .flip-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; top: 0; left: 0; right: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 24px 24px;
    display: flex; flex-direction: column;
    min-height: 280px;
  }

  .card-front { background: #fff; }
  .card-back  { transform: rotateY(180deg); }

  /* front layout */
  .card-topic-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600; letter-spacing: .05em;
    padding: 4px 10px; border-radius: 100px; margin-bottom: 20px;
    width: fit-content;
  }
  .card-zh {
    font-size: 26px; font-weight: 700; line-height: 1.3;
    color: #1a1a1a; flex: 1; display: flex; align-items: center;
  }
  .card-en {
    font-size: 13px; color: #aaa; margin-top: 14px;
    font-style: italic; letter-spacing: .02em;
  }
  .card-hint {
    font-size: 11px; color: #ccc; margin-top: 16px;
    text-align: center;
  }

  /* back layout */
  .card-back-header {
    font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 14px;
    opacity: .9;
  }
  .card-def {
    font-size: 16px; line-height: 1.75; color: #fff;
    flex: 1; display: flex; align-items: center;
  }
  .card-back-en {
    font-size: 11px; margin-top: 16px; color: rgba(255,255,255,.55);
    font-style: italic;
  }

  /* ── swipe hint ── */
  .swipe-hint {
    display: flex; gap: 20px; justify-content: center;
    margin-top: 16px; font-size: 11px; color: #bbb;
  }
  .swipe-hint span { display: flex; align-items: center; gap: 4px; }

  /* ── nav buttons ── */
  .nav-row {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; padding: 14px 16px 20px; flex-shrink: 0;
  }
  .nav-btn {
    width: 52px; height: 52px; border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; transition: transform .1s;
    box-shadow: 0 2px 10px rgba(0,0,0,.1);
  }
  .nav-btn:active { transform: scale(.93); }
  .nav-prev { background: #fff; color: #555; }
  .nav-next { background: #fff; color: #555; }
  .nav-flip {
    width: 64px; height: 64px; font-size: 26px;
    background: #1a1a1a; color: #fff;
  }

  /* ── mode toggle ── */
  .mode-bar {
    display: flex; gap: 8px; padding: 0 16px 6px;
    justify-content: center; flex-shrink: 0;
  }
  .mode-btn {
    font-size: 11px; padding: 5px 14px; border-radius: 100px;
    border: 1.5px solid #ddd; background: #fff; color: #888;
    cursor: pointer; font-weight: 500;
  }
  .mode-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  /* ── color themes per topic ── */
  .t0 .card-back { background: var(--blue); }
  .t0 .card-topic-badge { background: var(--blue-lt); color: var(--blue-dk); }
  .t0 .progress-fill { background: var(--blue); }
  .t0 .tab.active { background: var(--blue); }

  .t1 .card-back { background: var(--teal); }
  .t1 .card-topic-badge { background: var(--teal-lt); color: var(--teal-dk); }
  .t1 .progress-fill { background: var(--teal); }
  .t1 .tab.active { background: var(--teal); }

  .t2 .card-back { background: var(--amber); }
  .t2 .card-topic-badge { background: var(--amber-lt); color: var(--amber-dk); }
  .t2 .progress-fill { background: var(--amber); }
  .t2 .tab.active { background: var(--amber); }

  .t3 .card-back { background: var(--coral); }
  .t3 .card-topic-badge { background: var(--coral-lt); color: var(--coral-dk); }
  .t3 .progress-fill { background: var(--coral); }
  .t3 .tab.active { background: var(--coral); }

  .t4 .card-back { background: var(--purple); }
  .t4 .card-topic-badge { background: var(--purple-lt); color: var(--purple-dk); }
  .t4 .progress-fill { background: var(--purple); }
  .t4 .tab.active { background: var(--purple); }

  /* ── swipe animation ── */
  @keyframes slideOutLeft  { to { transform: translateX(-110%) rotate(-8deg); opacity:0; } }
  @keyframes slideOutRight { to { transform: translateX( 110%) rotate( 8deg); opacity:0; } }
  @keyframes slideInRight  { from { transform: translateX(110%) rotate(8deg); opacity:0; } to { transform:none; opacity:1; } }
  @keyframes slideInLeft   { from { transform: translateX(-110%) rotate(-8deg); opacity:0; } to { transform:none; opacity:1; } }
  .slide-out-left  { animation: slideOutLeft  .28s ease forwards; }
  .slide-out-right { animation: slideOutRight .28s ease forwards; }
  .slide-in-right  { animation: slideInRight  .28s ease forwards; }
  .slide-in-left   { animation: slideInLeft   .28s ease forwards; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">📋 iPAS AI應用規劃師初級</div>
  <div class="topbar-sub">點卡翻面・左右滑動換頁</div>
</div>

<div class="tabs" id="tabs"></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="card-area">
  <div class="card-counter" id="counter"></div>
  <div class="flip-wrap" id="flipWrap">
    <div class="flip-inner" id="flipInner">
      <div class="card-face card-front" id="cardFront"></div>
      <div class="card-face card-back"  id="cardBack"></div>
    </div>
  </div>
  <div class="swipe-hint">
    <span>← 上一張</span>
    <span>點擊翻面</span>
    <span>下一張 →</span>
  </div>
</div>

<div class="mode-bar">
  <button class="mode-btn active" id="modeAll"  onclick="setMode('all')">全部</button>
  <button class="mode-btn"        id="modeShuffle" onclick="setMode('shuffle')">🔀 隨機</button>
</div>

<div class="nav-row">
  <button class="nav-btn nav-prev" onclick="go(-1)" aria-label="上一張">←</button>
  <button class="nav-btn nav-flip" onclick="flipCard()" aria-label="翻面">↻</button>
  <button class="nav-btn nav-next" onclick="go(1)"  aria-label="下一張">→</button>
</div>

<script>
const topics = [
  {
    id: "L111", label: "AI概念", cls: "t0",
    cards: [
      { zh:"人工智慧 (AI)", en:"Artificial Intelligence", def:"讓電腦模擬人類智慧行為的科學領域，涵蓋感知、推理、學習與決策等能力。" },
      { zh:"弱AI / 強AI / 超AI", en:"Narrow / General / Super AI", def:"弱AI只執行特定任務；強AI具備人類級通用能力；超AI超越人類（目前仍屬理論）。" },
      { zh:"機器學習", en:"Machine Learning (ML)", def:"讓電腦從數據中自動學習規律，不需逐條手動編寫規則的技術。" },
      { zh:"深度學習", en:"Deep Learning (DL)", def:"使用多層神經網路處理複雜數據（圖像、語音），是機器學習的子領域。" },
      { zh:"類神經網路", en:"Neural Network", def:"模擬人腦神經元結構，由輸入層、隱藏層、輸出層組成的計算架構。" },
      { zh:"AI 治理", en:"AI Governance", def:"對AI系統制定規則、標準與監管機制，確保其安全、公平、透明。" },
      { zh:"演算法偏見", en:"Algorithmic Bias", def:"因訓練數據不均或設計缺陷，導致AI對特定群體產生不公平的預測或決策。" },
      { zh:"可解釋性 (XAI)", en:"Explainability / XAI", def:"使AI決策過程能被人類理解與追蹤，對醫療、金融等高風險應用尤為重要。" },
      { zh:"資料隱私", en:"Data Privacy", def:"保護個人敏感資料不被未授權蒐集或洩露，如GDPR、個資法等法規。" },
      { zh:"AI 安全性", en:"AI Safety", def:"確保AI系統在各種情境下行為可靠且不造成傷害，包含對抗性攻擊防禦。" },
    ]
  },
  {
    id: "L112", label: "資料處理", cls: "t1",
    cards: [
      { zh:"大數據", en:"Big Data", def:"具有 Volume（量大）、Velocity（速度快）、Variety（多樣）、Veracity（真實）特性的大規模資料集。" },
      { zh:"結構化資料", en:"Structured Data", def:"以固定格式儲存的資料，如Excel表格、SQL資料庫，可直接查詢分析。" },
      { zh:"非結構化資料", en:"Unstructured Data", def:"無固定格式的資料，如文字、圖像、影音，需NLP或CV等技術才能處理。" },
      { zh:"半結構化資料", en:"Semi-structured Data", def:"有部分結構但不完全規則，如JSON、XML、HTML等格式。" },
      { zh:"數值型資料", en:"Numerical Data", def:"可進行數學運算的資料，如年齡、溫度、收入，分連續型與離散型。" },
      { zh:"類別型資料", en:"Categorical Data", def:"以分組標籤呈現的資料，如性別、地區、產品類型，不可直接運算。" },
      { zh:"資料收集", en:"Data Collection", def:"透過感測器、爬蟲、問卷、API等方式蒐集原始資料的過程。" },
      { zh:"資料清理", en:"Data Cleaning", def:"處理缺失值、重複值、異常值，確保資料品質，是AI專案最耗時的步驟之一。" },
      { zh:"特徵工程", en:"Feature Engineering", def:"從原始資料中萃取、轉換或建立對模型有用的輸入變數（特徵）。" },
      { zh:"資料標注", en:"Data Labeling / Annotation", def:"為訓練資料加上正確標籤，如標記圖片中的物件，是監督式學習的前提。" },
      { zh:"資料視覺化", en:"Data Visualization", def:"用圖表（折線圖、熱力圖等）呈現數據趨勢，協助理解與溝通分析結果。" },
      { zh:"資料去識別化", en:"De-identification", def:"移除可辨識個人身份的資訊，讓資料可分析利用但不洩露隱私。" },
      { zh:"差分隱私", en:"Differential Privacy", def:"在資料中加入隨機雜訊，讓統計分析有效但無法推敲出個人資料。" },
      { zh:"聯邦學習", en:"Federated Learning", def:"讓模型在各設備上訓練，不上傳原始資料，保護數據隱私的分散式學習方式。" },
    ]
  },
  {
    id: "L113", label: "機器學習", cls: "t2",
    cards: [
      { zh:"監督式學習", en:"Supervised Learning", def:"使用有標籤的訓練資料（輸入＋正確答案）訓練模型，用於分類與迴歸問題。" },
      { zh:"非監督式學習", en:"Unsupervised Learning", def:"使用無標籤資料，讓模型自行找出數據結構，常見應用為分群（Clustering）。" },
      { zh:"強化學習", en:"Reinforcement Learning (RL)", def:"透過與環境互動、獲得獎勵或懲罰來學習最佳策略，如AlphaGo下棋。" },
      { zh:"半監督式學習", en:"Semi-supervised Learning", def:"混用少量標籤資料與大量無標籤資料訓練，降低標注成本。" },
      { zh:"決策樹", en:"Decision Tree", def:"用樹狀結構模擬決策過程，規則清楚易解釋，但容易過擬合。" },

      { zh:"支援向量機", en:"Support Vector Machine (SVM)", def:"找出最大化類別間隔的決策邊界，適合高維度資料的分類任務。" },
      { zh:"過擬合", en:"Overfitting", def:"模型過度記住訓練資料的細節，導致對新資料預測效果差（泛化不佳）。" },
      { zh:"欠擬合", en:"Underfitting", def:"模型太簡單，連訓練資料都無法學習好，需增加模型複雜度。" },
      { zh:"訓練集 / 驗證集 / 測試集", en:"Train / Validation / Test Set", def:"訓練集訓練模型；驗證集調整超參數；測試集評估最終泛化效果，三者需嚴格分開。" },
      { zh:"精確率 (Precision)", en:"Precision", def:"預測為正的樣本中，真正為正的比例。公式：TP ÷ (TP + FP)。" },
      { zh:"召回率 (Recall)", en:"Recall", def:"實際為正的樣本中，被正確預測出來的比例。公式：TP ÷ (TP + FN)。" },
      { zh:"F1 分數", en:"F1 Score", def:"精確率與召回率的調和平均值，適合評估類別不平衡的分類問題。" },
    ]
  },
  {
    id: "L114", label: "生成式AI", cls: "t3",
    cards: [
      { zh:"鑑別式模型", en:"Discriminative Model", def:"學習輸入與輸出之間的邊界，直接預測類別或數值，如分類器、迴歸模型。" },
      { zh:"電腦視覺 (CV)", en:"Computer Vision", def:"讓電腦理解圖像與影片，應用如物件偵測、人臉辨識、醫療影像分析。" },
      { zh:"自然語言處理 (NLP)", en:"Natural Language Processing", def:"讓電腦理解與生成人類語言，應用如情感分析、機器翻譯、問答系統。" },
      { zh:"語音辨識 (ASR)", en:"Automatic Speech Recognition", def:"將語音訊號轉換為文字，廣泛應用於語音助理與會議記錄系統。" },
      { zh:"生成式AI", en:"Generative AI", def:"能生成新內容（文字、圖像、音樂等）的AI，代表如GPT、Stable Diffusion。" },
      { zh:"大型語言模型 (LLM)", en:"Large Language Model", def:"以海量文字資料預訓練的大型模型，能理解與生成語言，如GPT-4、Claude、Gemini。" },
      { zh:"提示工程", en:"Prompt Engineering", def:"設計高品質輸入提示，引導LLM產出符合預期的輸出，是現階段重要AI應用技能。" },
      { zh:"幻覺現象", en:"Hallucination", def:"LLM生成看似合理但實際錯誤的資訊，是當前生成式AI的主要風險之一。" },
      { zh:"RAG 檢索增強生成", en:"Retrieval-Augmented Generation", def:"讓LLM先從外部知識庫檢索相關文件再生成回答，降低幻覺並支援即時資訊。" },
      { zh:"微調 (Fine-tuning)", en:"Fine-tuning", def:"在預訓練模型基礎上，用特定領域資料進行額外訓練，使其更適合特定任務。" },
      { zh:"擴散模型", en:"Diffusion Model", def:"圖像生成模型架構（如Stable Diffusion、DALL-E），透過逐步去噪過程生成高品質圖片。" },
      { zh:"Transformer 架構", en:"Transformer", def:"現代LLM的核心架構，透過自注意力（Self-attention）機制處理序列資料，是GPT等模型的基礎。" },
    ]
  },
  {
    id: "L12", label: "AI導入", cls: "t4",
    cards: [
      { zh:"No-code", en:"No-code", def:"不需撰寫程式碼，透過圖形介面拖拉設定即可建立應用，如Zapier、Notion AI。" },
      { zh:"Low-code", en:"Low-code", def:"只需少量程式碼即可快速開發應用，加速企業數位轉型，如Power Apps。" },
      { zh:"AI 代理 (Agent)", en:"AI Agent", def:"能自主規劃並執行多步驟任務的AI系統，可呼叫工具、瀏覽網路或操作應用程式。" },
      { zh:"多代理系統 (MAS)", en:"Multi-Agent System", def:"多個AI代理協作完成複雜任務的架構，各代理負責不同子任務，透過通訊協調。" },
      { zh:"MCP 協議", en:"Model Context Protocol", def:"代理間標準化通訊協議，讓AI模型與外部工具、資料來源互通的開放標準。" },
      { zh:"ROI 評估", en:"Return on Investment", def:"評估AI導入帶來的效益（成本節省、產能提升）是否高於投資成本，為導入決策核心指標。" },
      { zh:"POC 概念驗證", en:"Proof of Concept", def:"在正式部署前以小規模試驗驗證AI方案的可行性與效果，降低全面導入風險。" },
      { zh:"AI 風險管理", en:"AI Risk Management", def:"識別AI系統潛在風險（偏見、安全漏洞、法規不符）並制定對應緩解措施。" },
      { zh:"數位轉型", en:"Digital Transformation", def:"企業利用數位技術（含AI）重塑流程、文化與商業模式，提升整體競爭力。" },
      { zh:"Prompt 設計原則", en:"Prompt Design", def:"有效Prompt應包含：角色設定、任務描述、輸出格式、範例與限制條件，提升LLM輸出品質。" },
      { zh:"AI 倫理", en:"AI Ethics", def:"確保AI系統的開發與應用符合公平、透明、問責與尊重隱私等道德原則。" },
    ]
  }
];

let currentTopic = 0;
let currentIdx   = 0;
let isFlipped    = false;
let mode         = 'all';
let shuffled     = [];
let touchStartX  = 0;
let touchStartY  = 0;

function getCards() {
  return mode === 'shuffle' ? shuffled : topics[currentTopic].cards;
}

function setMode(m) {
  mode = m;
  document.getElementById('modeAll').classList.toggle('active', m === 'all');
  document.getElementById('modeShuffle').classList.toggle('active', m === 'shuffle');
  if (m === 'shuffle') {
    shuffled = [...topics[currentTopic].cards].sort(() => Math.random() - .5);
  }
  currentIdx = 0;
  isFlipped = false;
  renderCard(null);
}

function buildTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  topics.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === currentTopic ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => switchTopic(i);
    el.appendChild(btn);
  });
}

function switchTopic(i) {
  currentTopic = i;
  currentIdx   = 0;
  isFlipped    = false;
  shuffled     = [];
  mode         = 'all';
  document.getElementById('modeAll').classList.add('active');
  document.getElementById('modeShuffle').classList.remove('active');
  buildTabs();
  renderCard(null);
}

function renderCard(dir) {
  const t  = topics[currentTopic];
  const cards = getCards();
  const c  = cards[currentIdx];
  const flipWrap = document.getElementById('flipWrap');
  const flipInner= document.getElementById('flipInner');

  // color theme
  flipWrap.className = 'flip-wrap ' + t.cls;

  // progress
  const pct = ((currentIdx + 1) / cards.length * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('counter').textContent = (currentIdx + 1) + ' / ' + cards.length;

  // animate
  if (dir) {
    const outClass = dir === 'next' ? 'slide-out-left' : 'slide-out-right';
    const inClass  = dir === 'next' ? 'slide-in-right' : 'slide-in-left';
    flipInner.classList.add(outClass);
    setTimeout(() => {
      flipInner.classList.remove(outClass);
      flipInner.classList.remove('flipped');
      fillCard(c, t);
      flipInner.classList.add(inClass);
      setTimeout(() => flipInner.classList.remove(inClass), 300);
    }, 260);
  } else {
    flipInner.classList.remove('flipped');
    fillCard(c, t);
  }
}

function fillCard(c, t) {
  document.getElementById('cardFront').innerHTML = `
    <span class="card-topic-badge">${t.id} ${t.label}</span>
    <div class="card-zh">${c.zh}</div>
    <div class="card-en">${c.en}</div>
    <div class="card-hint">點擊查看說明 ↓</div>
  `;
  document.getElementById('cardBack').innerHTML = `
    <div class="card-back-header">${c.zh}</div>
    <div class="card-def">${c.def}</div>
    <div class="card-back-en">${c.en}</div>
  `;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flipInner').classList.toggle('flipped', isFlipped);
}

function go(dir) {
  const cards = getCards();
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= cards.length) return;
  isFlipped   = false;
  currentIdx  = newIdx;
  renderCard(dir > 0 ? 'next' : 'prev');
}

// click to flip
document.getElementById('flipWrap').addEventListener('click', flipCard);

// swipe support
document.getElementById('flipWrap').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('flipWrap').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    go(dx < 0 ? 1 : -1);
  }
}, { passive: true });

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  else if (e.key === 'ArrowLeft') go(-1);
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
});

// init
buildTabs();
renderCard(null);
</script>
</body>
</html>
